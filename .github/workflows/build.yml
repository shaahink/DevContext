
name: Build

on:
  push:
      branches:
        - 'main'
      tags:
        - '*'
  pull_request:

jobs:
  build:
    name: "Build, Test, Analyze and Publish"
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Run NUKE
      run: ./build.ps1
      env:
        NuGetApiKey: ${{ secrets.NUGETAPIKEY }}
        GitHubApiKey: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for 'lcov.info' existence
      id: check_files
      uses: andstor/file-existence-action@v3
      with:
        files: "TestResults/reports/lcov.info"

    - name: coveralls
      uses: coverallsapp/github-action@v2
      if: steps.check_files.outputs.files_exists == 'true'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: TestResults/reports/lcov.info

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          ./Artifacts/*
          ./TestResults/*.trx

  publish-test-results:
    name: "Publish Tests Results"
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    if: always()

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        comment_mode: always
        files: "artifacts/**/**/*.trx"

  integration-tests:
    name: "Integration Tests"
    runs-on: windows-latest
    needs: [build]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Build Core + tests
      run: dotnet build DevContext.Core.Tests/DevContext.Core.Tests.csproj -c Release

    - name: Run integration tests against real GitHub repos
      run: dotnet test DevContext.Core.Tests/DevContext.Core.Tests.csproj --filter "FullyQualifiedName~Integration" -c Release --no-build --logger "trx;LogFileName=integration.trx"

    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: TestResults/*.trx

  tool-validation:
    name: "CLI Smoke Test"
    runs-on: windows-latest
    needs: [build]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Build CLI
      run: dotnet build DevContext.Cli/DevContext.Cli.csproj -c Release

    - name: Run smoke extraction
      run: |
        dotnet run --project DevContext.Cli -- extract . --task "architecture overview" --around "DevContext.Core" -o smoke-context.md --no-progress
        if (!(Test-Path smoke-context.md)) { exit 1 }
        Write-Host "Smoke test passed. Output size: $((Get-Item smoke-context.md).Length) bytes"
