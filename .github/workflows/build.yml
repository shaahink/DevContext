
name: Build

on:
  push:
      branches:
        - 'main'
        - 'v1-polish'   # Active development branch for DevContext v1
      tags:
        - '*'
  pull_request:

jobs:
  build:
    name: "Build, Test, Analyze and Publish"
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: false

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Run NUKE
      run: ./build.ps1
      env:
        NuGetApiKey: ${{ secrets.NUGETAPIKEY }}
        GitHubApiKey: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for 'lcov.info' existence
      id: check_files
      uses: andstor/file-existence-action@v3
      with:
        files: "TestResults/reports/lcov.info"

    - name: coveralls
      uses: coverallsapp/github-action@v2
      if: steps.check_files.outputs.files_exists == 'true'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: TestResults/reports/lcov.info

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          ./Artifacts/*
          ./TestResults/*.trx

    # TODO: Add "Tool Validation" step once the CLI is more stable.
    # Example: build the CLI then run it against CleanArchitecture or DntSite sample
    # with standard --task profiles to guard context quality/scoping.

  publish-test-results:
    name: "Publish Tests Results"
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    if: always()

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        comment_mode: always
        files: "artifacts/**/**/*.trx"

  # Basic smoke test for the CLI tool itself (proves it builds and runs)
  tool-validation:
    name: "CLI Tool Smoke Test"
    runs-on: windows-latest
    needs: [build]
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Build CLI
      run: dotnet build DevContext.Cli/DevContext.Cli.csproj -c Release --no-restore

    - name: Smoke test - basic extraction on current solution
      run: |
        dotnet run --project DevContext.Cli -- extract . --task "architecture overview" --around "DevContext.Core" -o smoke-context.md --no-progress
        if (!(Test-Path smoke-context.md)) { exit 1 }
        Write-Host "Tool produced output successfully"

